# Performance Analyzer configuration
# Set to true to enable the plugin; false to disable it.
# Disabled here because the plugin requires additional OS-level permissions
# (CAP_SYS_PTRACE, /proc access) that are typically unavailable in containers.
performance-analyzer.enabled=false

# Metrics collection settings (only used when plugin is enabled)
#webservice-bind-host=0.0.0.0
#webservice-listener-port=9600
#writer-queue-size=100000

# RCA framework settings
#rca.enabled=false
#batch-metrics-enabled=false
#logging-enabled=false
